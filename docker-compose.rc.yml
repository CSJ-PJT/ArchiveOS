services:
  archiveos-ai:
    environment:
      SPRING_PROFILES_ACTIVE: rc
      DB_NAME: ${DB_NAME:?DB_NAME is required for rc}
      DB_USER: ${DB_USER:?DB_USER is required for rc}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required for rc}
      ARCHIVEOS_ADMIN_PASSWORD: ${ARCHIVEOS_ADMIN_PASSWORD:?ARCHIVEOS_ADMIN_PASSWORD is required for rc}
      ARCHIVE_TOKEN_MARKET_TO_OS: ${ARCHIVE_TOKEN_MARKET_TO_OS:?ARCHIVE_TOKEN_MARKET_TO_OS is required for rc}
      ARCHIVE_TOKEN_NEXUS_TO_OS: ${ARCHIVE_TOKEN_NEXUS_TO_OS:?ARCHIVE_TOKEN_NEXUS_TO_OS is required for rc}
      ARCHIVE_TOKEN_LOGISTICS_TO_OS: ${ARCHIVE_TOKEN_LOGISTICS_TO_OS:?ARCHIVE_TOKEN_LOGISTICS_TO_OS is required for rc}
      ARCHIVE_TOKEN_LEDGER_TO_OS: ${ARCHIVE_TOKEN_LEDGER_TO_OS:?ARCHIVE_TOKEN_LEDGER_TO_OS is required for rc}
      ARCHIVE_TOKEN_OS_TO_LEDGER: ${ARCHIVE_TOKEN_OS_TO_LEDGER:?ARCHIVE_TOKEN_OS_TO_LEDGER is required for rc}
      ARCHIVE_TOKEN_AUTHENTICATED_READ: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:?ARCHIVE_TOKEN_AUTHENTICATED_READ is required for rc}
      ARCHIVE_TOKEN_ADMIN_OPERATOR: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:?ARCHIVE_TOKEN_ADMIN_OPERATOR is required for rc}
  backend:
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required for rc}
