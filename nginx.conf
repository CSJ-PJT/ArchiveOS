server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Obsidian embedding sync is explicit and can take longer than nginx's
    # default one-minute upstream timeout. Keep the UI request aligned with
    # the backend operation instead of reporting a false gateway failure.
    proxy_connect_timeout 15s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  location = /health {
    proxy_pass http://backend:4000/health;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
