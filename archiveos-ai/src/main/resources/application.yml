server:
  port: ${ARCHIVEOS_AI_PORT:4100}

spring:
  application:
    name: archiveos-ai
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:../.env.local[.properties]
      - optional:file:.env[.properties]
      - optional:file:.env.local[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:archiveos}
    username: ${DB_USER:archiveos}
    password: ${DB_PASSWORD:archiveos}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:archiveos-disabled-key}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: false

archiveos:
  openai-api-key: ${OPENAI_API_KEY:}
  obsidian-vault-path: ${OBSIDIAN_VAULT_PATH:}
  obsidian-chunk-size: ${OBSIDIAN_CHUNK_SIZE:1200}
  obsidian-chunk-overlap: ${OBSIDIAN_CHUNK_OVERLAP:160}
  rag-max-references: ${RAG_MAX_REFERENCES:5}
  deploy-compose-file: ${ARCHIVEOS_DEPLOY_COMPOSE_FILE:}
  health-check-url: ${ARCHIVEOS_HEALTH_CHECK_URL:}
  node-base-url: ${ARCHIVEOS_NODE_BASE_URL:http://localhost:4000}
  public-url: ${ARCHIVEOS_PUBLIC_URL:}
  backend-public-url: ${ARCHIVEOS_BACKEND_PUBLIC_URL:}
  git-commit: ${ARCHIVEOS_GIT_COMMIT:}
  git-branch: ${ARCHIVEOS_GIT_BRANCH:}
  notifications:
    slack-webhook-url: ${SLACK_WEBHOOK_URL:}
    slack-bot-token: ${SLACK_BOT_TOKEN:}
    slack-channel: ${SLACK_CHANNEL:}
  ledger:
    base-url: ${ARCHIVE_LEDGER_BASE_URL:}
    callback-token: ${ARCHIVE_LEDGER_CALLBACK_TOKEN:}
    enabled: ${ARCHIVE_LEDGER_ENABLED:false}
  scheduler:
    enabled: ${ARCHIVEOS_SCHEDULER_ENABLED:false}
    nightly-cron: ${ARCHIVEOS_NIGHTLY_CRON:0 50 23 * * *}
    daily-cron: ${ARCHIVEOS_DAILY_CRON:0 0 9 * * *}
  security:
    admin-password: ${ARCHIVEOS_ADMIN_PASSWORD:}
    integration-token: ${ARCHIVEOS_INTEGRATION_TOKEN:}
    session-timeout-minutes: ${ARCHIVEOS_SESSION_TIMEOUT_MINUTES:30}
    max-login-attempts: ${ARCHIVEOS_LOGIN_MAX_ATTEMPTS:5}
    lockout-minutes: ${ARCHIVEOS_LOGIN_LOCKOUT_MINUTES:15}
    secure-cookie: ${ARCHIVEOS_SECURE_COOKIE:false}

archive:
  ecosystem:
    enabled: ${ARCHIVE_ECOSYSTEM_ENABLED:true}
    refresh-timeout-ms: ${ARCHIVE_ECOSYSTEM_REFRESH_TIMEOUT_MS:3000}
    services:
      nexus:
        enabled: ${ARCHIVE_ECOSYSTEM_SERVICES_NEXUS_ENABLED:true}
        name: Archive-Nexus
        base-url: ${ARCHIVE_ECOSYSTEM_SERVICES_NEXUS_BASE_URL:http://localhost:8080}
        health-path: /actuator/health
        summary-path: /api/outbox/summary
      logitics:
        enabled: ${ARCHIVE_ECOSYSTEM_SERVICES_LOGITICS_ENABLED:true}
        name: Archive-Logitics
        base-url: ${ARCHIVE_ECOSYSTEM_SERVICES_LOGITICS_BASE_URL:http://localhost:8092}
        health-path: /actuator/health
        summary-path: /api/operations/summary
        outbox-summary-path: /api/outbox/summary
        route-summary-path: /api/routes/summary
      ledger:
        enabled: ${ARCHIVE_ECOSYSTEM_SERVICES_LEDGER_ENABLED:true}
        name: Archive-Ledger
        base-url: ${ARCHIVE_ECOSYSTEM_SERVICES_LEDGER_BASE_URL:http://localhost:18080}
        health-path: /actuator/health
        summary-path: /api/operations/summary
        approval-required-path: /api/transactions?status=APPROVAL_REQUIRED
        reconciliation-summary-path: /api/reconciliation/summary
        approval-callback-path: /api/approvals/callback
  integration:
    safe-mode: ${ARCHIVE_INTEGRATION_SAFE_MODE:true}
    allow-external-write: ${ARCHIVE_INTEGRATION_ALLOW_EXTERNAL_WRITE:false}
    callback:
      enabled: ${ARCHIVE_INTEGRATION_CALLBACK_ENABLED:true}
      max-retry-count: ${ARCHIVE_INTEGRATION_CALLBACK_MAX_RETRY_COUNT:5}
      retry-delay-seconds: ${ARCHIVE_INTEGRATION_CALLBACK_RETRY_DELAY_SECONDS:30}
