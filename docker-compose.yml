services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-archiveos}
      POSTGRES_USER: ${DB_USER:-archiveos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-archiveos}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - archiveos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    init: true
    environment:
      PORT: 4000
      ARCHIVEOS_AI_BASE_URL: http://archiveos-ai:4100
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ARCHIVEOS_OBSIDIAN_VAULT_PATH: ${ARCHIVEOS_OBSIDIAN_VAULT_PATH:-}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      archiveos-ai:
        condition: service_healthy

  archiveos-ai:
    restart: unless-stopped
    build:
      context: ./archiveos-ai
    restart: unless-stopped
    init: true
    environment:
      ARCHIVEOS_AI_PORT: 4100
      OPENAI_API_KEY: ${OPENAI_API_KEY:-archiveos-disabled-key}
      OBSIDIAN_VAULT_PATH: /vault
      OBSIDIAN_CHUNK_SIZE: ${OBSIDIAN_CHUNK_SIZE:-1200}
      OBSIDIAN_CHUNK_OVERLAP: ${OBSIDIAN_CHUNK_OVERLAP:-160}
      RAG_MAX_REFERENCES: ${RAG_MAX_REFERENCES:-5}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-archiveos}
      DB_USER: ${DB_USER:-archiveos}
      DB_PASSWORD: ${DB_PASSWORD:-archiveos}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ARCHIVEOS_NODE_BASE_URL: http://backend:4000
      ARCHIVEOS_PUBLIC_URL: ${ARCHIVEOS_PUBLIC_URL:-}
      ARCHIVEOS_SCHEDULER_ENABLED: ${ARCHIVEOS_SCHEDULER_ENABLED:-false}
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:4100/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - ${HOST_OBSIDIAN_VAULT_PATH:-./docs}:/vault:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: .
    restart: unless-stopped
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  archiveos-postgres:
