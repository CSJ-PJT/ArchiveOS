services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - archiveos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    init: true
    environment:
      PORT: 4000
      ARCHIVEOS_AI_BASE_URL: http://archiveos-ai:4100
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ARCHIVEOS_OBSIDIAN_VAULT_PATH: ${ARCHIVEOS_OBSIDIAN_VAULT_PATH:-/vault}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      MCP_QUEUE_PATH: /runtime/queue
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./tools/runtime/queue:/runtime/queue
      - ${HOST_OBSIDIAN_VAULT_PATH:-./docs}:/vault
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      archiveos-ai:
        condition: service_healthy

  archiveos-ai:
    build:
      context: ./archiveos-ai
    restart: unless-stopped
    init: true
    environment:
      ARCHIVEOS_AI_PORT: 4100
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:-}
      SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:-}
      OBSIDIAN_VAULT_PATH: /vault
      ARCHIVE_TOKEN_MARKET_TO_OS: ${ARCHIVE_TOKEN_MARKET_TO_OS:-}
      ARCHIVE_TOKEN_NEXUS_TO_OS: ${ARCHIVE_TOKEN_NEXUS_TO_OS:-}
      ARCHIVE_TOKEN_LOGISTICS_TO_OS: ${ARCHIVE_TOKEN_LOGISTICS_TO_OS:-}
      ARCHIVE_TOKEN_LEDGER_TO_OS: ${ARCHIVE_TOKEN_LEDGER_TO_OS:-}
      ARCHIVE_WORLD_ADAPTER_MODE: ${ARCHIVE_WORLD_ADAPTER_MODE:-mock}
      ARCHIVE_WORLD_MANIFEST_PATH: /archive-world/assets/manifests/archive-world-assets.json
      ARCHIVE_WORLD_EVENT_LIMIT: ${ARCHIVE_WORLD_EVENT_LIMIT:-100}
      ARCHIVE_TOKEN_AUTHENTICATED_READ: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:-}
      ARCHIVE_TOKEN_ADMIN_OPERATOR: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:-}
      OBSIDIAN_CHUNK_SIZE: ${OBSIDIAN_CHUNK_SIZE:-1200}
      OBSIDIAN_CHUNK_OVERLAP: ${OBSIDIAN_CHUNK_OVERLAP:-160}
      RAG_MAX_REFERENCES: ${RAG_MAX_REFERENCES:-5}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL: ${SLACK_CHANNEL:-archiveos-alerts}
      ARCHIVEOS_NODE_BASE_URL: http://backend:4000
      ARCHIVEOS_PUBLIC_URL: ${ARCHIVEOS_PUBLIC_URL:-}
      ARCHIVEOS_SCHEDULER_ENABLED: ${ARCHIVEOS_SCHEDULER_ENABLED:-false}
      # Development preserves the application default. The RC overlay explicitly
      # disables this collector unless an operator deliberately enables it.
      ARCHIVE_LIVE_FLOW_COLLECTOR_ENABLED: ${ARCHIVE_LIVE_FLOW_COLLECTOR_ENABLED:-true}
      ARCHIVE_RAG_SEARCH_RATE_LIMIT_PER_MINUTE: ${ARCHIVE_RAG_SEARCH_RATE_LIMIT_PER_MINUTE:-60}
      ARCHIVE_RAG_ASK_RATE_LIMIT_PER_MINUTE: ${ARCHIVE_RAG_ASK_RATE_LIMIT_PER_MINUTE:-12}
      ARCHIVEOS_ADMIN_PASSWORD: ${ARCHIVEOS_ADMIN_PASSWORD:-}
      ARCHIVEOS_INTEGRATION_TOKEN: ${ARCHIVEOS_INTEGRATION_TOKEN:-}
      ARCHIVEOS_SESSION_TIMEOUT_MINUTES: ${ARCHIVEOS_SESSION_TIMEOUT_MINUTES:-30}
      ARCHIVEOS_LOGIN_MAX_ATTEMPTS: ${ARCHIVEOS_LOGIN_MAX_ATTEMPTS:-5}
      ARCHIVEOS_LOGIN_LOCKOUT_MINUTES: ${ARCHIVEOS_LOGIN_LOCKOUT_MINUTES:-15}
      ARCHIVEOS_SECURE_COOKIE: ${ARCHIVEOS_SECURE_COOKIE:-false}
      ARCHIVE_LEDGER_BASE_URL: ${ARCHIVE_LEDGER_BASE_URL:-}
      ARCHIVE_TOKEN_OS_TO_LEDGER: ${ARCHIVE_TOKEN_OS_TO_LEDGER:-}
      ARCHIVE_LEDGER_ENABLED: ${ARCHIVE_LEDGER_ENABLED:-false}
      ARCHIVE_ECOSYSTEM_ENABLED: ${ARCHIVE_ECOSYSTEM_ENABLED:-true}
      ARCHIVE_ECOSYSTEM_REFRESH_TIMEOUT_MS: ${ARCHIVE_ECOSYSTEM_REFRESH_TIMEOUT_MS:-3000}
      ARCHIVE_ECOSYSTEM_SERVICES_NEXUS_ENABLED: ${ARCHIVE_ECOSYSTEM_SERVICES_NEXUS_ENABLED:-true}
      ARCHIVE_ECOSYSTEM_SERVICES_NEXUS_BASE_URL: ${ARCHIVE_ECOSYSTEM_SERVICES_NEXUS_BASE_URL:-http://host.docker.internal:8080}
      ARCHIVE_ECOSYSTEM_SERVICES_MARKET_ENABLED: ${ARCHIVE_ECOSYSTEM_SERVICES_MARKET_ENABLED:-true}
      ARCHIVE_ECOSYSTEM_SERVICES_MARKET_BASE_URL: ${ARCHIVE_ECOSYSTEM_SERVICES_MARKET_BASE_URL:-http://host.docker.internal:8094}
      ARCHIVE_ECOSYSTEM_SERVICES_LOGITICS_ENABLED: ${ARCHIVE_ECOSYSTEM_SERVICES_LOGITICS_ENABLED:-true}
      ARCHIVE_ECOSYSTEM_SERVICES_LOGITICS_BASE_URL: ${ARCHIVE_ECOSYSTEM_SERVICES_LOGITICS_BASE_URL:-http://host.docker.internal:8092}
      ARCHIVE_ECOSYSTEM_SERVICES_LEDGER_ENABLED: ${ARCHIVE_ECOSYSTEM_SERVICES_LEDGER_ENABLED:-true}
      ARCHIVE_ECOSYSTEM_SERVICES_LEDGER_BASE_URL: ${ARCHIVE_ECOSYSTEM_SERVICES_LEDGER_BASE_URL:-http://host.docker.internal:18080}
      ARCHIVE_INTEGRATION_SAFE_MODE: ${ARCHIVE_INTEGRATION_SAFE_MODE:-true}
      ARCHIVE_INTEGRATION_ALLOW_EXTERNAL_WRITE: ${ARCHIVE_INTEGRATION_ALLOW_EXTERNAL_WRITE:-false}
      ARCHIVE_INTEGRATION_CALLBACK_ENABLED: ${ARCHIVE_INTEGRATION_CALLBACK_ENABLED:-true}
      ARCHIVE_INTEGRATION_CALLBACK_MAX_RETRY_COUNT: ${ARCHIVE_INTEGRATION_CALLBACK_MAX_RETRY_COUNT:-5}
      ARCHIVE_INTEGRATION_CALLBACK_RETRY_DELAY_SECONDS: ${ARCHIVE_INTEGRATION_CALLBACK_RETRY_DELAY_SECONDS:-30}
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:4100/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      # Memory Writer writes only after an explicit ADMIN-approved API action.
      # Sync and embedding remain separate manual actions.
      - ${HOST_OBSIDIAN_VAULT_PATH:-./docs}:/vault
      - ${HOST_ARCHIVE_WORLD_ROOT:-../Archive-World}:/archive-world:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - archive-runtime

  frontend:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  archiveos-postgres:

networks:
  archive-runtime:
    name: archive-runtime
