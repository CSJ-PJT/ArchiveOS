services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-archiveos}
      POSTGRES_USER: ${DB_USER:-archiveos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-archiveos}
    ports:
      - "5432:5432"
    volumes:
      - archiveos-postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ARCHIVEOS_OBSIDIAN_VAULT_PATH: ${ARCHIVEOS_OBSIDIAN_VAULT_PATH:-}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  archiveos-ai:
    build:
      context: ./archiveos-ai
    environment:
      ARCHIVEOS_AI_PORT: 4100
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-archiveos}
      DB_USER: ${DB_USER:-archiveos}
      DB_PASSWORD: ${DB_PASSWORD:-archiveos}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "4100:4100"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  archiveos-postgres:
